<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hertz - Disputes</title>
  <style>
    :root { --hertz-yellow: #ffcc00; --hertz-black: #000000; --bg-gray: #f8f9fa; --border-color: #dddddd; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gray); }
    header { background: var(--hertz-black); color: white; padding: 0 40px; display: flex; align-items: center; height: 60px; }
    .logo { font-size: 24px; font-weight: 900; font-style: italic; margin-right: 40px; }
    nav a { color: #aaa; text-decoration: none; margin-right: 25px; font-size: 14px; font-weight: 600; padding-bottom: 5px; }
    nav a.active { color: var(--hertz-yellow); border-bottom: 2px solid var(--hertz-yellow); }
    .container { padding: 40px; max-width: 1300px; margin: auto; }
    .card { background: white; border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; background: #fafafa; padding: 15px 20px; font-size: 12px; color: #666; }
    td { padding: 15px 20px; border-bottom: 1px solid #eee; font-size: 14px; }
    .dispute-by { font-weight: bold; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
    .vendor-flag { background: #e3f2fd; color: #0d47a1; }
    .hertz-flag { background: #fff8e1; color: #ff8f00; }
  </style>
</head>
<body>
<header>
  <div class="logo">Hertz</div>
  <nav>
    <a href="./index.html">Home</a>
    <a href="./invoices.html">Invoices</a>
    <a href="./disputes.html" class="active">Disputes</a>
    <a href="./reports.html">Reports</a>
  </nav>
</header>
<div class="container">
  <h1>Dispute Resolution Center</h1>
  <div class="card">
    <table>
      <thead><tr><th>Invoice #</th><th>Vendor</th><th>Disputed By</th><th>Amount</th></tr></thead>
      <tbody>
        <tr><td><strong>INV-9001</strong></td><td>Ford Motor Co.</td><td><span class="dispute-by vendor-flag">VENDOR</span></td><td>$1,240.00</td></tr>
        <tr><td><strong>INV-9005</strong></td><td>Penske Truck</td><td><span class="dispute-by hertz-flag">HERTZ</span></td><td>$450.00</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
