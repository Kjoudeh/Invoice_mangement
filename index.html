<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hertz - Dashboard</title>
  <style>
    :root { --hertz-yellow: #ffcc00; --hertz-black: #000000; --bg-gray: #f8f9fa; --border-color: #eeeeee; --text-gray: #666666; }
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg-gray); color: #333; }
    header { background: var(--hertz-black); color: white; padding: 0 40px; display: flex; align-items: center; height: 60px; }
    .logo { font-size: 24px; font-weight: 900; font-style: italic; margin-right: 40px; letter-spacing: -1px; }
    nav a { color: #aaa; text-decoration: none; margin-right: 25px; font-size: 14px; font-weight: 500; padding-bottom: 5px; }
    nav a.active { color: var(--hertz-yellow); border-bottom: 2px solid var(--hertz-yellow); }
    .container { padding: 30px 40px; max-width: 1200px; margin: auto; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
    .stat-card h4 { margin: 0; font-size: 13px; color: var(--text-gray); }
    .stat-card .value { font-size: 24px; font-weight: bold; margin: 10px 0; }
    .card { background: white; border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
    .card-header { padding: 20px; font-weight: bold; border-bottom: 1px solid var(--border-color); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; background: #fafafa; color: var(--text-gray); padding: 15px 20px; }
    td { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
    .status { padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; }
    .pending { background: #fff8e1; color: #f39c12; }
  </style>
</head>
<body>
<header>
  <div class="logo">Hertz</div>
  <nav>
    <a href="./index.html" class="active">Dashboard</a>
    <a href="./invoices.html">Invoices</a>
    <a href="./disputes.html">Disputes</a>
    <a href="#">Reports</a>
  </nav>
</header>
<div class="container">
  <div class="dashboard-header"><h1>Dashboard</h1></div>
  <div class="stats-grid">
    <div class="stat-card"><h4>Total Invoices</h4><div class="value">1,245</div></div>
    <div class="stat-card"><h4>Open Disputes</h4><div class="value">14</div></div>
    <div class="stat-card"><h4>Pending Approval</h4><div class="value">320</div></div>
    <div class="stat-card"><h4>Total Paid</h4><div class="value">$2.45M</div></div>
  </div>
  <div class="card">
    <div class="card-header">Recent Activity</div>
    <table>
      <thead><tr><th>Invoice #</th><th>Vendor</th><th>Status</th></tr></thead>
      <tbody><tr><td>INV-100245</td><td>ABC Services LLC</td><td><span class="status pending">Pending</span></td></tr></tbody>
    </table>
  </div>
</div>
</body>
</html>
